<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#2C5F4A"/>
  
  <!-- Geometric line pattern inspired by business card -->
  <g stroke="#ffffff" stroke-width="0.8" opacity="0.25" fill="none">
    <line x1="0" y1="8" x2="8" y2="0"/>
    <line x1="0" y1="16" x2="16" y2="0"/>
    <line x1="0" y1="24" x2="24" y2="0"/>
    <line x1="4" y1="32" x2="32" y2="4"/>
    <line x1="12" y1="32" x2="32" y2="12"/>
    <line x1="20" y1="32" x2="32" y2="20"/>
    <line x1="28" y1="32" x2="32" y2="28"/>
  </g>

  <!-- BR monogram -->
  <text x="16" y="22" font-family="Georgia, serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">BR</text>
</svg>
