<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Blog Admin | Bill Reichle Counseling</title>
</head>
<body>
  <script>window.CMS_MANUAL_INIT = true;</script>
  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.1.3/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        load_config_file: false,
        backend: {
          name: 'github',
          repo: 'jamieraedouglass/BillReichle',
          branch: 'main',
          base_url: 'https://bill-reichle.vercel.app',
          auth_endpoint: 'api/auth',
          auth_scope: 'repo'
        },
        media_folder: 'images/blog',
        public_folder: '/images/blog',
        collections: [
          {
            name: 'settings',
            label: 'Settings',
            files: [
              {
                name: 'prices',
                label: 'Service Prices',
                file: '_data/prices.json',
                fields: [
                  { label: 'Individual Counseling ($)', name: 'individual', widget: 'number', value_type: 'int', min: 0 },
                  { label: 'Family Counseling ($)', name: 'family', widget: 'number', value_type: 'int', min: 0 },
                  { label: 'Parent Counseling ($)', name: 'parent', widget: 'number', value_type: 'int', min: 0 },
                  { label: 'Case Consultation - Professionals ($)', name: 'consultation', widget: 'number', value_type: 'int', min: 0 },
                  { label: 'ESA Letter ($)', name: 'esa', widget: 'number', value_type: 'int', min: 0 },
                  { label: 'Strategy Deep-Dive - Professionals page ($)', name: 'pro_strategy', widget: 'number', value_type: 'int', min: 0 },
                  { label: 'Practice Launchpad - Professionals page ($)', name: 'pro_launchpad', widget: 'number', value_type: 'int', min: 0 },
                  { label: 'Clinical Case Consultation - Professionals page ($)', name: 'pro_consultation', widget: 'number', value_type: 'int', min: 0 }
                ]
              }
            ]
          },
          {
            name: 'reviews',
            label: 'Reviews',
            files: [
              {
                name: 'all_reviews',
                label: 'All Reviews',
                file: 'data/reviews.json',
                fields: [
                  {
                    label: 'Reviews',
                    name: 'reviews',
                    widget: 'list',
                    summary: '{{fields.author}} — {{fields.section}}',
                    fields: [
                      {
                        label: 'Section',
                        name: 'section',
                        widget: 'select',
                        options: [
                          { label: 'Client / Family', value: 'clients' },
                          { label: 'Colleague / Medical Professional', value: 'colleagues' },
                          { label: 'Personal Note', value: 'personal' }
                        ]
                      },
                      { label: 'Quote', name: 'quote', widget: 'text' },
                      { label: 'Author Name', name: 'author', widget: 'string' },
                      { label: 'Role / Title', name: 'role', widget: 'string', hint: 'e.g. Physician referral, Parent of student-athlete, Google review' },
                      { label: 'Featured (green highlight)', name: 'featured', widget: 'boolean', default: false, required: false },
                      { label: 'Wide card (spans 2 columns)', name: 'long', widget: 'boolean', default: false, required: false },
                      { label: 'Show on homepage', name: 'homepage', widget: 'boolean', default: false, required: false }
                    ]
                  }
                ]
              }
            ]
          },
          {
            name: 'faq',
            label: 'FAQ',
            files: [
              {
                name: 'all_faqs',
                label: 'All FAQs',
                file: 'data/faq.json',
                fields: [
                  {
                    label: 'FAQs',
                    name: 'faqs',
                    widget: 'list',
                    summary: '{{fields.question}}',
                    fields: [
                      { label: 'Question', name: 'question', widget: 'string' },
                      { label: 'Answer', name: 'answer', widget: 'text' }
                    ]
                  }
                ]
              }
            ]
          },
          {
            name: 'posts',
            label: 'Blog Posts',
            folder: '_posts',
            create: true,
            slug: '{{year}}-{{month}}-{{day}}-{{slug}}',
            fields: [
              { label: 'Title', name: 'title', widget: 'string' },
              { label: 'Date', name: 'date', widget: 'datetime' },
              { label: 'Author', name: 'author', widget: 'string', default: 'Bill Reichle' },
              {
                label: 'Category', name: 'category', widget: 'select',
                options: [
                  { label: 'ADHD', value: 'adhd' },
                  { label: 'Athletes', value: 'athletes' },
                  { label: 'Anxiety', value: 'anxiety' },
                  { label: 'Parenting', value: 'parenting' },
                  { label: 'Youth', value: 'youth' },
                  { label: 'Wellness', value: 'wellness' },
                  { label: 'Relationships', value: 'relationships' },
                  { label: 'Life Transitions', value: 'life-transitions' }
                ]
              },
              { label: 'Featured Image', name: 'image', widget: 'image', required: false },
              { label: 'Summary', name: 'summary', widget: 'text', hint: 'A short 1-2 sentence summary shown on the blog listing page' },
              { label: 'Body', name: 'body', widget: 'markdown' }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
